<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MJ Grid Tools</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page">
      <header class="page-header">
        <h1>MJ Grid Tools</h1>
        <p>
          Compare or rank Midjourney job outputs using job_ids.
        </p>
      </header>

      <section class="tool-hub">
        <div class="tool-cards" role="tablist" aria-label="Tool selector">
          <button
            class="tool-card is-active"
            type="button"
            data-tool-target="compare"
            role="tab"
            aria-selected="true"
          >
            <div class="tool-card-title">Grid Compare</div>
            <div class="tool-card-meta">
              Side-by-side comparisons across job sets.
            </div>
          </button>
          <button
            class="tool-card"
            type="button"
            data-tool-target="rank"
            role="tab"
            aria-selected="false"
          >
            <div class="tool-card-title">Grid Rank</div>
            <div class="tool-card-meta">
              Blind ranking of shuffled job sets.
            </div>
          </button>
          <button
            class="tool-card"
            type="button"
            data-tool-target="scale"
            role="tab"
            aria-selected="false"
          >
            <div class="tool-card-title">Grid Scale</div>
            <div class="tool-card-meta">
              Explore parameter sweeps across axes.
            </div>
          </button>
        </div>
      </section>

      <main id="toolMount" class="tool-mount"></main>
    </div>

    <button id="toTopBtn" class="to-top" type="button">Back to top</button>

    <script type="module" src="app.js"></script>
  </body>
</html>
